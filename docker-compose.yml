version: '3.8'

services:
  # Serviço de Banco de Dados MariaDB
  db:
    image: mariadb:11.2
    container_name: gusto_mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: restaurant_root_pass
      MYSQL_DATABASE: restaurant_db
      MYSQL_USER: restaurant_user
      MYSQL_PASSWORD: restaurant_pass
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      # Script opcional de inicialização adicional
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço da Aplicação Next.js
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gusto_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=restaurant_user
      - DB_PASSWORD=restaurant_pass
      - DB_NAME=restaurant_db
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

volumes:
  mariadb_data:
    driver: local
